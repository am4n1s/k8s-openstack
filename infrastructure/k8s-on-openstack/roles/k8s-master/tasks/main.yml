
---

# ============================================================

# Role: k8s-master

# Настраивает master ноду и устанавливает CNI

# ============================================================

- name: Проверить статус нод

  command: kubectl get nodes

  register: nodes_status

  changed_when: false

- name: Показать ноды

  debug:

    var: nodes_status.stdout_lines

- name: Включить ingress addon в minikube

  command: minikube addons enable ingress

  register: ingress_result

  changed_when: "'enabled' in ingress_result.stdout"

  ignore_errors: true

- name: Включить dashboard addon

  command: minikube addons enable dashboard

  register: dashboard_result

  changed_when: "'enabled' in dashboard_result.stdout"

  ignore_errors: true

- name: Включить metrics-server addon

  command: minikube addons enable metrics-server

  register: metrics_result

  changed_when: "'enabled' in metrics_result.stdout"

  ignore_errors: true

- name: Показать все активные addons

  command: minikube addons list

  register: addons_list

  changed_when: false

- name: Создать namespace для приложений

  kubernetes.core.k8s:

    name: k8s-demo

    api_version: v1

    kind: Namespace

    state: present

- name: Показать все namespaces

  command: kubectl get namespaces

  register: namespaces

  changed_when: false

- name: Вывести namespaces

  debug:

    var: namespaces.stdout_lines

