---
- name: Проверить что minikube установлен
  command: minikube version
  register: minikube_version
  changed_when: false

- name: Показать версию minikube
  debug:
    msg: "{{ minikube_version.stdout }}"

- name: Проверить статус minikube
  command: minikube status
  register: minikube_status
  changed_when: false
  ignore_errors: true

- name: Запустить minikube если остановлен или не запущен
  command: >
    minikube start
    --driver={{ minikube_driver }}
    --cpus={{ minikube_cpus }}
    --memory={{ minikube_memory }}
  when: "'Running' not in minikube_status.stdout"
  register: minikube_start

- name: Подождать пока кластер будет готов
  command: kubectl wait --for=condition=Ready node/minikube --timeout=120s
  when: minikube_start is changed
  changed_when: false

- name: Показать финальный статус кластера
  command: minikube status
  register: final_status
  changed_when: false

- name: Вывести статус
  debug:
    var: final_status.stdout_lines
