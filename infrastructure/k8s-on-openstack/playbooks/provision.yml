
---

# ============================================================

# Playbook: provision.yml

# Запускает и проверяет локальный кластер через Minikube

# ============================================================

- name: Provision кластера (Minikube)

  hosts: masters

  gather_facts: false

  pre_tasks:

    - name: Проверить что minikube доступен

      command: minikube version

      changed_when: false

  roles:

    - openstack-provision

  post_tasks:

    - name: Показать итоговый статус

      command: kubectl get nodes -o wide

      register: final_nodes

      changed_when: false

    - name: Вывести ноды

      debug:

        var: final_nodes.stdout_lines

