
---

# ============================================================

# Playbook: k8s-install.yml

# Устанавливает и настраивает Kubernetes компоненты

# ============================================================

- name: Проверка prerequisites

  hosts: masters

  gather_facts: false

  roles:

    - k8s-prerequisites

- name: Настройка master ноды

  hosts: masters

  gather_facts: false

  roles:

    - k8s-master

- name: Настройка worker нод

  hosts: masters

  gather_facts: false

  roles:

    - k8s-worker

- name: Финальный статус кластера

  hosts: masters

  gather_facts: false

  tasks:

    - name: kubectl get nodes

      command: kubectl get nodes -o wide

      register: final_nodes

      changed_when: false

    - name: "=== КЛАСТЕР ГОТОВ ==="

      debug:

        var: final_nodes.stdout_lines

    - name: Показать все поды

      command: kubectl get pods -A

      register: all_pods

      changed_when: false

    - name: Вывести все поды

      debug:

        var: all_pods.stdout_lines

